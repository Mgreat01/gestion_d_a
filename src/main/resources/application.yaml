spring:
  application:
    name: gestionD

  # Configuration de la base de données
  datasource:
    url: jdbc:postgresql://localhost:5432/gestiond_db
    username:
    password:
    driver-class-name: org.postgresql.Driver

  # Configuration JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


server:
  port: 8080


logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG